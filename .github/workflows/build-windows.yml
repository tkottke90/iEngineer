name: Build Windows client

# Builds the Tauri client natively on a Windows runner (no cross-compile, no local
# toolchain/junction headaches) and uploads iracing-engineer.exe as a job artifact.
# Defaults to GPU STT (whisper.cpp + Vulkan): the Vulkan SDK is installed on the
# runner so the vulkan shaders compile. Trigger manually from the Actions tab
# (pick a backend) or on pushes that touch the client.

on:
  workflow_dispatch:
    inputs:
      stt_backend:
        description: "STT backend for push-to-talk"
        type: choice
        options: [vulkan, cpu, none]
        default: vulkan
  push:
    branches: [main, 005-llm-push-to-talk]
    paths:
      - "apps/tauri-client/**"
      - "packages/types/**"
      - "packages/ui/**"
      - ".github/workflows/build-windows.yml"

jobs:
  build:
    runs-on: windows-latest
    env:
      # Consumed by npm when expanding ${NPM_TOKEN} in .npmrc (see the auth step).
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute build variables (features + short SHA)
        id: feat
        shell: bash
        run: |
          backend="${{ github.event.inputs.stt_backend }}"
          [ -z "$backend" ] && backend="vulkan"   # push events default to GPU STT
          case "$backend" in
            vulkan) f="custom-protocol stt-vulkan" ;;
            cpu)    f="custom-protocol stt" ;;
            none)   f="custom-protocol" ;;
            *)      f="custom-protocol stt-vulkan" ;;
          esac
          echo "features=$f" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "Building ${GITHUB_SHA::7} with features: $f"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri-client/src-tauri

      # whisper.cpp's Vulkan backend needs the SDK headers, vulkan-1.lib, and glslc
      # (to compile the compute shaders). Install the full LunarG SDK when building
      # the vulkan feature. Silent install flags are LunarG's QtIFW commands.
      - name: Install Vulkan SDK
        if: contains(steps.feat.outputs.features, 'vulkan')
        shell: pwsh
        run: |
          $ver = "1.3.296.0"
          $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/VulkanSDK-$ver-Installer.exe"
          $exe = Join-Path $env:RUNNER_TEMP "VulkanSDK-Installer.exe"
          Write-Host "Downloading Vulkan SDK $ver ..."
          Invoke-WebRequest -Uri $url -OutFile $exe
          Write-Host "Installing (silent) ..."
          $p = Start-Process -FilePath $exe -ArgumentList "--accept-licenses","--default-answer","--confirm-command","install" -PassThru -Wait -NoNewWindow
          if ($p.ExitCode -ne 0) { throw "Vulkan SDK installer exited with code $($p.ExitCode)" }
          $sdk = (Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1).FullName
          Write-Host "VULKAN_SDK = $sdk"
          "VULKAN_SDK=$sdk" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$sdk\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      # Auth for the private registry (@tkottke90 scope in .npmrc). Single quotes keep
      # ${NPM_TOKEN} literal in the file; npm expands it from the env at install time.
      # MUST run before any npm install.
      - name: Configure private npm registry auth
        shell: bash
        run: echo '//npm.artifacts.tdkottke.com/:_authToken=${NPM_TOKEN}' >> .npmrc

      - name: Install dependencies
        run: npm ci

      # GitHub's Windows runner normally links workspaces fine; belt-and-suspenders
      # fallback that creates the junctions if npm didn't.
      - name: Ensure @iracing-engineer workspace links
        shell: pwsh
        run: |
          $base = "node_modules/@iracing-engineer"
          if (-not (Test-Path "$base/types/package.json")) {
            Write-Host "npm did not link workspaces - creating junctions"
            New-Item -ItemType Directory -Force -Path $base | Out-Null
            $map = @{ "types" = "packages/types"; "ui" = "packages/ui"; "tauri-client" = "apps/tauri-client" }
            foreach ($k in $map.Keys) {
              $link = Join-Path $base $k
              if (Test-Path $link) { cmd /c rmdir "$link" 2>$null }
              New-Item -ItemType Junction -Path $link -Target (Resolve-Path $map[$k]).Path | Out-Null
            }
          }
          Get-ChildItem $base | Select-Object Name, LinkType, Target

      - name: Build workspace packages (types, then ui)
        run: |
          npm run build -w packages/types
          npm run build -w packages/ui

      - name: Build frontend (embedded via custom-protocol)
        run: npm run build -w apps/tauri-client

      - name: Build Windows binary (native MSVC)
        working-directory: apps/tauri-client/src-tauri
        run: cargo build --release --features "${{ steps.feat.outputs.features }}"

      - name: Fetch Whisper model (STT builds only)
        if: contains(steps.feat.outputs.features, 'stt')
        run: curl -L -o apps/tauri-client/src-tauri/models/ggml-base.en.bin https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.en.bin

      - name: Stage ready-to-run bundle
        shell: bash
        run: |
          mkdir -p out/models
          cp apps/tauri-client/src-tauri/target/release/iracing-engineer.exe out/
          if [ -f apps/tauri-client/src-tauri/models/ggml-base.en.bin ]; then
            cp apps/tauri-client/src-tauri/models/ggml-base.en.bin out/models/
          fi
          ls -R out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.feat.outputs.short_sha }}-iracing-engineer-windows
          path: out/
          if-no-files-found: error
