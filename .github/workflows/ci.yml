name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Consumed by npm when expanding ${NPM_TOKEN} in .npmrc (private @tkottke90 registry).
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      # Step 1: Verify docker-compose uses redis:7-alpine (gate check)
      - uses: actions/checkout@v4

      - name: "Step 1: Verify redis:7-alpine in docker-compose"
        run: grep -q "redis:7-alpine" infra/docker-compose.yml

      # Step 2: Redis service is provided above via services.redis

      # Step 3: Run Rust integration tests (single-threaded — streams are ordered)
      # Tauri v2 on Linux compiles against the GTK/WebKit stack, and cpal
      # needs ALSA headers. Never surfaced before because the old cargo step
      # failed at the package spec without compiling anything.
      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev \
            libssl-dev libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri-client/src-tauri

      - name: "Step 3: cargo test"
        # -p takes the PACKAGE name (iracing-engineer), not the lib target
        # (iracing_engineer_lib). The old spec never matched — this step failed
        # in ~30s on every run since M4, so the npm steps below never executed.
        run: cargo test -p iracing-engineer --lib -- --test-threads=1
        working-directory: apps/tauri-client/src-tauri
        env:
          REDIS_URL: redis://localhost:6379

      # Step 4: Build hub-server (catches TypeScript errors in the node package)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Auth for the private registry (@tkottke90 scope in .npmrc) — before npm install.
      # Single quotes keep ${NPM_TOKEN} literal; npm expands it from the env.
      - name: Configure private npm registry auth
        run: echo '//npm.artifacts.tdkottke.com/:_authToken=${NPM_TOKEN}' >> .npmrc

      - name: Install npm dependencies
        run: npm ci

      # Workspace-wide so packages/types + packages/ui dist/ exist before the
      # hub (and any consumer) builds or tests against their `main` entries.
      - name: "Step 4: Build workspace"
        run: npm run build

      # Step 5 (M10 T043 — Constitution III & V enforcement): the tier3
      # write-path audit test MUST run in CI (FR-029 ladder branch a). Also
      # runs the client/ui/types suites per T041/C1.
      - name: "Step 5: Unit tests (hub tier3 audit gate + client + ui + types)"
        run: npm test -w packages/types -w packages/ui -w apps/tauri-client -w apps/hub-server
