services:
  redis:
    image: redis:7-alpine
    ports:
      - '0.0.0.0:6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --protected-mode no

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: iracing_engineer
      POSTGRES_USER: iracing
      POSTGRES_PASSWORD: iracing
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../apps/hub-server/src/db/migrations:/docker-entrypoint-initdb.d

  #############################
