  #     - speaches-models:/root/.cache/huggingface
  #     - ./config/speaches:/app/config
  #   environment:
  #     - WHISPER_MODEL=base.en

  # chatterbox:
  #   image: ghcr.io/devnen/chatterbox-tts-api:latest
  #   ports:
  #     - "8004:8004"
  #   volumes:
  #     - chatterbox-models:/app/models
  #     - ./config/chatterbox:/app/config
  #     # M10 T005 — voice-profile reference audio shared with the hub server.
  #     # The hub currently runs on the HOST (there is no hub-server service in
  #     # this compose file), so this is a host bind mount rather than a named
  #     # volume: the host-run hub writes uploaded MP3s to
  #     # infra/data/chatterbox/reference and the container reads them here.
  #     # NOTE (open decision — spec 006 analysis C1): engineer-config.json
